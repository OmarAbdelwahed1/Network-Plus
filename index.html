<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIAA QASSEM | SYSTEM OVERRIDE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        :root {
            --neon-green: #0f0;
            --dark-bg: #050505;
            --glass: rgba(0, 20, 0, 0.7);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--dark-bg);
            color: var(--neon-green);
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
        }

        /* --- BACKGROUND LAYERS --- */
        #matrix-canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
            opacity: 0.3;
        }

        #globe-canvas {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            pointer-events: none;
            opacity: 0.6;
        }

        /* --- UI CONTAINER --- */
        .ui-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            background: radial-gradient(circle at center, transparent 0%, #000 120%);
        }

        .panel {
            background: var(--glass);
            border: 1px solid var(--neon-green);
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
            padding: 20px;
            width: 90%;
            max-width: 450px;
            border-radius: 5px;
            backdrop-filter: blur(3px);
            position: relative;
        }

        /* Glitch Header */
        .glitch-header {
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 20px;
            position: relative;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .glitch-header::before, .glitch-header::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--dark-bg);
        }

        .glitch-header::before {
            left: 2px;
            text-shadow: -1px 0 red;
            clip: rect(24px, 550px, 90px, 0);
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
        }

        .glitch-header::after {
            left: -2px;
            text-shadow: -1px 0 blue;
            clip: rect(85px, 550px, 140px, 0);
            animation: glitch-anim 2.5s infinite linear alternate-reverse;
        }

        /* Inputs */
        .input-list {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 15px;
            border: 1px solid #333;
            padding: 5px;
        }
        
        .input-list::-webkit-scrollbar { width: 5px; }
        .input-list::-webkit-scrollbar-thumb { background: var(--neon-green); }

        .input-row {
            display: flex;
            margin-bottom: 5px;
            animation: slideIn 0.3s ease;
        }

        input {
            background: transparent;
            border: none;
            border-bottom: 1px solid #333;
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1rem;
            flex: 1;
            outline: none;
        }
        input:focus { border-bottom: 1px solid var(--neon-green); }

        .btn-group {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        button {
            background: transparent;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 8px 15px;
            cursor: pointer;
            font-family: 'Share Tech Mono', monospace;
            text-transform: uppercase;
            transition: 0.2s;
        }

        button:hover {
            background: var(--neon-green);
            color: #000;
            box-shadow: 0 0 10px var(--neon-green);
        }

        button.remove-btn {
            border-color: red;
            color: red;
        }
        button.remove-btn:hover { background: red; color: white; box-shadow: 0 0 10px red; }

        #start-btn {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 2px;
            border: 2px solid var(--neon-green);
        }

        /* --- OVERLAY & RESULTS --- */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #countdown {
            font-size: 8rem;
            color: var(--neon-green);
            text-shadow: 0 0 20px var(--neon-green);
        }

        #final-result {
            font-size: 4rem;
            text-align: center;
            color: #fff;
            text-shadow: 0 0 10px #fff, 0 0 20px var(--neon-green);
            display: none;
            animation: shake 0.5s infinite;
        }

        #explosion-canvas {
            position: absolute;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 101;
        }

        /* --- ANIMATIONS --- */
        @keyframes glitch-anim {
            0% { clip: rect(10px, 9999px, 30px, 0); }
            20% { clip: rect(80px, 9999px, 100px, 0); }
            40% { clip: rect(10px, 9999px, 50px, 0); }
            60% { clip: rect(60px, 9999px, 80px, 0); }
            80% { clip: rect(20px, 9999px, 60px, 0); }
            100% { clip: rect(90px, 9999px, 100px, 0); }
        }
        @keyframes glitch-anim-2 {
            0% { clip: rect(60px, 9999px, 70px, 0); }
            20% { clip: rect(10px, 9999px, 20px, 0); }
            40% { clip: rect(90px, 9999px, 100px, 0); }
            60% { clip: rect(30px, 9999px, 40px, 0); }
            80% { clip: rect(50px, 9999px, 60px, 0); }
            100% { clip: rect(10px, 9999px, 20px, 0); }
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>
    <canvas id="globe-canvas"></canvas>
    <canvas id="explosion-canvas"></canvas>

    <div class="ui-container">
        <div class="panel">
            <h1 class="glitch-header" data-text="SYSTEM_OVERRIDE">Killer</h1>
            
            <div class="input-list" id="input-list">
                <div class="input-row"><input type="text" placeholder="ENTER TARGET NAME..." class="name-input"></div>
            </div>

            <div class="btn-group">
                <button onclick="addInput()">[ + ] ADD</button>
                <button class="remove-btn" onclick="removeInput()">[ - ] REMOVE</button>
            </div>

            <button id="start-btn" onclick="initiateSequence()">INITIATE PROTOCOL</button>
        </div>
    </div>


    <div id="overlay">
        <div id="countdown">3</div>
        <div id="final-result">TARGET ACQUIRED</div>
        <button onclick="resetSystem()" style="margin-top: 50px; display:none;" id="reset-btn">RESET SYSTEM</button>
    </div>

    <script>
        /* --- 1. MATRIX RAIN (Background) --- */
        const matrixCanvas = document.getElementById('matrix-canvas');
        const mCtx = matrixCanvas.getContext('2d');
        
        matrixCanvas.width = window.innerWidth;
        matrixCanvas.height = window.innerHeight;

        // The specific text requested
        const matrixText = "diaa qassem devops engineer "; 
        const characters = matrixText.split("");
        
        const fontSize = 14;
        const columns = matrixCanvas.width / fontSize;
        const drops = [];

        for(let x = 0; x < columns; x++) drops[x] = 1;

        function drawMatrix() {
            mCtx.fillStyle = "rgba(0, 0, 0, 0.05)";
            mCtx.fillRect(0, 0, matrixCanvas.width, matrixCanvas.height);
            mCtx.fillStyle = "#0F0";
            mCtx.font = fontSize + "px monospace";

            for(let i = 0; i < drops.length; i++) {
                const text = characters[Math.floor(Math.random() * characters.length)];
                mCtx.fillText(text, i * fontSize, drops[i] * fontSize);
                if(drops[i] * fontSize > matrixCanvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 35);


        /* --- 2. 3D GLOBE (Holographic Wireframe) --- */
        const globeCanvas = document.getElementById('globe-canvas');
        const gCtx = globeCanvas.getContext('2d');
        let width, height;
        
        function resizeGlobe() {
            width = window.innerWidth;
            height = window.innerHeight;
            globeCanvas.width = width;
            globeCanvas.height = height;
        }
        window.addEventListener('resize', resizeGlobe);
        resizeGlobe();

        const particles = [];
        const numParticles = 400;
        const radius = 200; // Size of globe

        class Particle {
            constructor() {
                this.theta = Math.random() * Math.PI * 2;
                this.phi = Math.acos((Math.random() * 2) - 1);
                this.x = 0; this.y = 0; this.z = 0;
            }
            update(angleY, angleX) {
                // Rotation math
                let x = radius * Math.sin(this.phi) * Math.cos(this.theta);
                let y = radius * Math.sin(this.phi) * Math.sin(this.theta);
                let z = radius * Math.cos(this.phi);

                // Rotate Y
                let x1 = x * Math.cos(angleY) - z * Math.sin(angleY);
                let z1 = z * Math.cos(angleY) + x * Math.sin(angleY);
                
                // Rotate X
                let y1 = y * Math.cos(angleX) - z1 * Math.sin(angleX);
                let z2 = z1 * Math.cos(angleX) + y * Math.sin(angleX);

                this.x = x1;
                this.y = y1;
                this.z = z2;
            }
            draw() {
                // Perspective
                const scale = 300 / (300 + this.z); 
                const x2d = (this.x * scale) + width / 2;
                const y2d = (this.y * scale) + height / 2;
                
                const alpha = (this.z + radius) / (2 * radius); // Fade back particles
                
                gCtx.fillStyle = `rgba(0, 255, 0, ${alpha})`;
                gCtx.beginPath();
                gCtx.arc(x2d, y2d, 2 * scale, 0, Math.PI * 2);
                gCtx.fill();
            }
        }

        for(let i=0; i<numParticles; i++) particles.push(new Particle());

        let angleY = 0;
        let angleX = 0.2;

        function animateGlobe() {
            gCtx.clearRect(0, 0, width, height);
            angleY += 0.005; // Spin speed
            
            particles.forEach(p => {
                p.update(angleY, angleX);
                p.draw();
            });
            
            // Draw connecting lines for wireframe effect (optional, keeps it clean without)
            requestAnimationFrame(animateGlobe);
        }
        animateGlobe();


        /* --- 3. AUDIO SYSTEM (Synthesized Sounds) --- */
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'click') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'countdown') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'win') {
                // Explosion/Win sound
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.5);
                gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
                osc.start();
                osc.stop(audioCtx.currentTime + 1.5);
            }
        }


        /* --- 4. EXPLOSION EFFECT --- */
        const expCanvas = document.getElementById('explosion-canvas');
        const eCtx = expCanvas.getContext('2d');
        expCanvas.width = window.innerWidth;
        expCanvas.height = window.innerHeight;
        let explosions = [];

        class ParticleExp {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * 15;
                this.vy = (Math.random() - 0.5) * 15;
                this.life = 100;
                this.color = `hsl(${Math.random()*60 + 100}, 100%, 50%)`; // Green/Yellow
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.2; // Gravity
                this.life -= 2;
            }
            draw() {
                eCtx.fillStyle = this.color;
                eCtx.globalAlpha = this.life / 100;
                eCtx.fillRect(this.x, this.y, 4, 4);
                eCtx.globalAlpha = 1;
            }
        }

        function triggerExplosion() {
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            for(let i=0; i<150; i++) {
                explosions.push(new ParticleExp(centerX, centerY));
            }
            animateExplosions();
        }

        function animateExplosions() {
            if(explosions.length === 0) return;
            eCtx.clearRect(0, 0, expCanvas.width, expCanvas.height);
            for(let i=0; i<explosions.length; i++) {
                explosions[i].update();
                explosions[i].draw();
                if(explosions[i].life <= 0) {
                    explosions.splice(i, 1);
                    i--;
                }
            }
            requestAnimationFrame(animateExplosions);
        }


        /* --- 5. GAME LOGIC --- */
        function addInput() {
            playSound('click');
            const div = document.createElement('div');
            div.className = 'input-row';
            div.innerHTML = `<input type="text" placeholder="ENTER TARGET NAME..." class="name-input">`;
            document.getElementById('input-list').appendChild(div);
        }

        function removeInput() {
            playSound('click');
            const list = document.getElementById('input-list');
            if(list.children.length > 1) list.removeChild(list.lastChild);
        }

        function getNames() {
            const inputs = document.querySelectorAll('.name-input');
            let names = [];
            inputs.forEach(inp => {
                if(inp.value.trim() !== "") names.push(inp.value.trim());
            });
            return names;
        }

        function initiateSequence() {
            const names = getNames();
            if(names.length < 2) {
                alert("ERROR: INSUFFICIENT DATA. ENTER AT LEAST 2 NAMES.");
                return;
            }

            const overlay = document.getElementById('overlay');
            const countdownEl = document.getElementById('countdown');
            const resultEl = document.getElementById('final-result');
            const resetBtn = document.getElementById('reset-btn');

            overlay.style.display = 'flex';
            countdownEl.style.display = 'block';
            resultEl.style.display = 'none';
            resetBtn.style.display = 'none';

            let count = 3;
            countdownEl.innerText = count;
            playSound('countdown');

            const timer = setInterval(() => {
                count--;
                if(count > 0) {
                    countdownEl.innerText = count;
                    playSound('countdown');
                } else {
                    clearInterval(timer);
                    countdownEl.style.display = 'none';
                    finalizeWinner(names);
                }
            }, 1000);
        }

        function finalizeWinner(names) {
            const resultEl = document.getElementById('final-result');
            const resetBtn = document.getElementById('reset-btn');
            
            // Shuffling effect before showing winner
            let shuffles = 0;
            const maxShuffles = 20;
            const interval = setInterval(() => {
                const randomName = names[Math.floor(Math.random() * names.length)];
                resultEl.innerText = randomName;
                resultEl.style.display = 'block';
                playSound('click');
                shuffles++;

                if(shuffles >= maxShuffles) {
                    clearInterval(interval);
                    // THE WINNER
                    const winner = names[Math.floor(Math.random() * names.length)];
                    resultEl.innerText = winner;
                    playSound('win');
                    triggerExplosion();
                    resetBtn.style.display = 'block';
                }
            }, 100);
        }

        function resetSystem() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('final-result').innerText = "";
        }

    </script>
</body>
</html>
